name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  build:
    runs-on: self-hosted

    env:
      ECR_REPOSITORY: salesgaatha-org/theforce
      IMAGE_TAG: latest

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Pull the Image from Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Delete Old docker container
      run: docker rm -f backend || true

    - name: Run Docker Container
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: docker run -d --env-file /home/ubuntu/.env -p 8000:8000 --name backend $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  build:
    runs-on: self-hosted
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1
    - name: Pull the Image from Amazon ECR
      id: pull-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: salesgaatha-org/theforce
        IMAGE_TAG: latest
      run: sudo docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
    - name: Delete Old docker container
      run: sudo docker rm -f backend || true
    - name: Run Docker Container
      run: sudo docker run -d --env-file .env -p 8000:8000 --name backend $ECR_REGISTRY/$ECR_REPOSITORY

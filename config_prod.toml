# -----------------------------------------------------------------------------
# Global application settings (Config)
# -----------------------------------------------------------------------------
app_name = "Salesforce"
app_version = "0.1.0"
debug = false
environment = "PROD"

# -----------------------------------------------------------------------------
# Server settings (ServerConfig)
# -----------------------------------------------------------------------------
[server]
host = "0.0.0.0"
port = 8000
workers = 2
reload = false

cors_enabled = true
cors_origins = "*"
cors_allow_credentials = true
cors_allow_methods = "*"
cors_allow_headers = "*"

max_request_size = 10485760
request_timeout = 60

rate_limit_enabled = false
rate_limit_per_minute = 60

# -----------------------------------------------------------------------------
# PostgreSQL database settings (DatabaseConfig)
# -----------------------------------------------------------------------------
[postgres]
pool_min_size = 1
pool_max_size = 4
pool_max_inactive_connection_lifetime = 300.0
pool_timeout = 10.0

# -----------------------------------------------------------------------------
# Agent configuration
# -----------------------------------------------------------------------------
[agent]
complexity_threshold = 0.5
backend_url = "http://localhost:8000"
company_id = "2f5376ef-c158-4cfc-a8b8-130a64d19f14"
enable_followup = true
max_followup = 2
memory_backend = "dynamodb"
table_name = "agent-memory"
orchestrator_model = "gpt-5-mini"
orchestrator_max_tokens = 4096
orchestrator_temperature = 0.0
simple_model = "gpt-5-mini"
simple_max_tokens = 4096
simple_temperature = 0.0

# -----------------------------------------------------------------------------
# AWS configuration
# -----------------------------------------------------------------------------
[aws]
region_name = "ap-south-1"